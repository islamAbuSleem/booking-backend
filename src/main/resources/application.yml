 spring:
   application:
     name: booking-backend

   datasource:
     url: jdbc:postgresql://localhost:5432/booking_db
     username: postgres
     password: postgres
     driver-class-name: org.postgresql.Driver

   jpa:
     hibernate:
       ddl-auto: update
     show-sql: true
     properties:
        hibernate:
            format_sql: true
            dialect: org.hibernate.dialect.PostgreSQLDialect

 server:
   port: 8080
   error:
     include-message: always