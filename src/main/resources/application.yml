spring:
  application:
    name: booking-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/booking_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
  error:
    include-message: always

jwt:
  secret: your_very_long_and_very_secure_secret_key_that_is_at_least_32_characters_long
  expiration: 86400000